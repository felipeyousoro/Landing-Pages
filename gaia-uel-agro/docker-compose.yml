services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gaia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gaia}
      POSTGRES_DB: ${POSTGRES_DB:-gaia_uel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-gaia} -d ${POSTGRES_DB:-gaia_uel}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gaia}:${POSTGRES_PASSWORD:-gaia}@db:5432/${POSTGRES_DB:-gaia_uel}
      USE_MAIL: ${USE_MAIL:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL:-}
      CONTACT_FROM_EMAIL: ${CONTACT_FROM_EMAIL:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
